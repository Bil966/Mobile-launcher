name: geode_mod_manager
description: Mod Manager cho Geometry Dash (Geode) trên Android.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  permission_handler: ^11.4.0
  android_intent_plus: ^5.3.0
  file_picker: ^8.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/app_icon.png
  adaptive_icon_background: "#0D1B2A"
  adaptive_icon_foreground: assets/app_icon.png
